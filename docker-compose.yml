# definimos la versión a utilizar de docker-compose
version: '3.8'

# a continuación se definen los servicios que se van a utilizar
services:

  # servicio de postgres
  postgres:
    image: postgres:17
    container_name: practica_evaluada_db
    # reinicia el contenedor a menos que se detenga manualmente
    restart: unless-stopped
    # variables de entorno para configurar postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: db_sistema_reporte
    # volumen para persistir los datos de postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql-init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"

  # Servicio de pgadmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    # indicamos que pgadmin depende de postgres
    depends_on:
      - postgres

# Declaración global de volúmenes
volumes:
  pgdata: